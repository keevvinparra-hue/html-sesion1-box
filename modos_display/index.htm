<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>Document</title>
    <style>
        .elemento{
            display: inline;
            background-color: #000;
            color: white;
            width: 200px;
            height: 200px;
        }
        .resaltado{
            color: aqua; 
            letter-spacing: 2px;
            font-family: Arial;
            font-size: large;
            font-weight: bold;
        }
        .elemento_block{
            display: block;
            background-color: #023;
            color: rgb(228, 62, 62);
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <h1> inline: </h1>
    <div class="elemento ">
        produco
    </div>
    <div class="elemento resaltado">
        contacto
    </div>
    <div class="elemento resaltado">
        servicios
    </div>
    <hr>
    <h1> block </h1>
        <div class="elemento_block">
        produco
    </div>
    <div class="elemento_block">
        contacto
    </div>
    <div class="elemento_block">
        servicios
    </div>
</body>
</html>
